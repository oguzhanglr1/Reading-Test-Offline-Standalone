<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifreyi Düzenle</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="edit-password" class="auth-page soft-background">
    <main class="auth-shell auth-shell-compact">
        <section class="auth-card auth-card-wide">
            <div class="auth-badge">Duzenle</div>
            <h2>Sifre Degistir</h2>
            <p class="auth-subtitle">Guclu ve hatirlamasi kolay bir sifre secmeye calis.</p>
            <p id="passwordError" class="error-message hidden"></p>
            <form id="passwordForm" class="auth-form">
                <label class="input-group" for="current_password">
                    <span>Mevcut sifre</span>
                    <input type="password" id="current_password" name="current_password" required>
                </label>
                <label class="input-group" for="new_password">
                    <span>Yeni sifre</span>
                    <input type="password" id="new_password" name="new_password" required>
                </label>
                <label class="input-group" for="confirm_password">
                    <span>Yeni sifre tekrar</span>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </label>
                <input type="submit" class="primary-action" value="Kaydet">
            </form>
            <div class="auth-footer-actions">
                <button type="button" class="ghost-button" data-link="profil.html">Profile Don</button>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
</body>
</html>

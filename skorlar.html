<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skorlar</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="skorlar" class="app-page">
    <header class="app-topbar">
        <div class="brand-block" data-link="welcome.html">
            <p class="brand-kicker">Reading Test</p>
            <h1>Skorlar</h1>
        </div>

        <nav class="app-nav">
            <button class="header-button nav-button" data-link="welcome.html">Test</button>
            <button class="header-button nav-button" data-link="yorumlar.html">Yorumlar</button>
        </nav>

        <div class="profile-container top-profile-panel app-user-panel">
            <span id="scoresUserName" class="user-name"></span>
            <a href="profil.html" class="profile-button">Profil</a>
            <a href="#" id="scoresLogoutButton" class="logout-button">Cikis Yap</a>
        </div>
    </header>

    <main class="app-layout single-column-layout">
        <section class="table-container app-panel themed-card">
            <div class="panel-header">
                <p class="section-kicker">Genel siralama</p>
                <h3>Tum Skorlar</h3>
            </div>
            <table class="themed-table">
                <thead>
                    <tr>
                        <th>Kullanici Adi</th>
                        <th>Zaman</th>
                        <th>Kelime Sayisi</th>
                        <th>Dogru Kelime Sayisi</th>
                    </tr>
                </thead>
                <tbody id="allScoresBody"></tbody>
            </table>
        </section>

        <section class="table-container app-panel themed-card">
            <div class="panel-header">
                <p class="section-kicker">Kisisel alan</p>
                <h3 id="myScoresTitle"></h3>
            </div>
            <table class="themed-table">
                <thead>
                    <tr>
                        <th>Zaman</th>
                        <th>Kelime Sayisi</th>
                        <th>Dogru Kelime Sayisi</th>
                        <th>Sil</th>
                    </tr>
                </thead>
                <tbody id="myScoresBody"></tbody>
            </table>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Bilgileri</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="profil" class="profile-page">
    <header class="app-topbar compact-topbar">
        <div class="brand-block" data-link="welcome.html">
            <p class="brand-kicker">Reading Test</p>
            <h1>Profil</h1>
        </div>

        <nav class="app-nav">
            <button class="header-button nav-button" data-link="welcome.html">Teste Don</button>
            <button class="header-button nav-button" data-link="skorlar.html">Skorlar</button>
            <button class="header-button nav-button" data-link="yorumlar.html">Yorumlar</button>
        </nav>
    </header>

    <main class="app-layout single-column-layout">
        <section class="profile-info-card themed-card">
            <div class="panel-header">
                <p class="section-kicker">Kisisel bilgiler</p>
                <h3>Profil Bilgileri</h3>
            </div>

            <div class="profile-item">
                <div class="profile-label">Kullanici Adi</div>
                <div class="profile-value profile-actions-inline"><span id="profileUsername"></span> <button class="change-button nav-button" data-link="edit_username.html">Degistir</button></div>
            </div>
            <div class="profile-item">
                <div class="profile-label">Isim</div>
                <div class="profile-value" id="profileIsim"></div>
            </div>
            <div class="profile-item">
                <div class="profile-label">Soyisim</div>
                <div class="profile-value" id="profileSoyisim"></div>
            </div>
            <div class="profile-item">
                <div class="profile-label">Email</div>
                <div class="profile-value" id="profileEmail"></div>
            </div>
            <div class="profile-item">
                <div class="profile-label">Sifre</div>
                <div class="profile-value profile-actions-inline">****** <button class="change-button nav-button" data-link="edit_password.html">Degistir</button></div>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris Yap</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="login" class="auth-page">
    <main class="auth-shell auth-shell-compact">
        <section class="auth-card">
            <div class="auth-badge">Hos geldin</div>
            <h2>Giris Yap</h2>
            <p class="auth-subtitle">Kayitli hesabinla devam et ve son testlerine geri don.</p>
            <p id="loginError" class="error-message hidden">Hatali e-posta veya sifre.</p>

            <form id="loginForm" class="auth-form">
                <label class="input-group" for="loginEmail">
                    <span>E-posta</span>
                    <input id="loginEmail" type="email" name="email" placeholder="ornek@mail.com" required>
                </label>

                <label class="input-group" for="loginPassword">
                    <span>Sifre</span>
                    <input id="loginPassword" type="password" name="sifre" placeholder="Sifrenizi girin" required>
                </label>

                <button type="submit" class="primary-action">Giris Yap</button>
            </form>

            <div class="auth-footer-actions">
                <button type="button" class="ghost-button" data-link="index.html">Ana Sayfaya Don</button>
                <a href="register.html" class="auth-inline-link">Hesabin yok mu? Kayit ol</a>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
</body>
</html>
